name: "Detailed Bug Report"
description: "Use this for complex bugs that require environment details and reproduction steps."
title: "[Detailed Bug]: "
labels: ["bug", "detailed"]
body:
  - type: markdown
    attributes:
      value: |
        **Thanks for taking the time to report a detailed bug!**
        Please ensure you are using the latest version of the repository.
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      description: "Please help us help you by checking these boxes."
      options:
        - label: "I have searched for existing issues."
          required: true
        - label: "I have followed the build instructions in the README."
          required: true
        - label: "I am using the latest version of the `main` branch."
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear and concise description of what the bug is."
      placeholder: "Describe what happened..."
    validations:
      required: true
  - type: input
    id: commit-hash
    attributes:
      label: Commit Hash / Version
      description: "Provide the commit hash or version you are running."
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: "How can we reproduce this bug?"
      placeholder: |
        1. Open MinecraftConsoles.sln
        2. Set configuration to ...
        3. Do ...
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs. Actual Behavior
      description: "What did you expect to happen, and what actually happened?"
    validations:
      required: true
  - type: dropdown
    id: build-config
    attributes:
      label: Build Configuration
      description: "Which configuration were you using?"
      options:
        - Debug
        - Release
        - Both
    validations:
      required: true
  - type: dropdown
    id: target-platform
    attributes:
      label: Target Platform
      description: "Which platform were you targeting?"
      options:
        - Windows64
        - Other (please specify)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: "e.g., Visual Studio version, Windows version."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Visual Proof & Logs
      description: "Drag and drop screenshots, videos, or logs."
    validations:
      required: false
