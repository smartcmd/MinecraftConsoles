name: Build Minecraft Legacy Console Edition (Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends build-essential git clang lld ninja-build cmake extra-cmake-modules python3 wine msitools ca-certificates libwbclient0
          CLANG_VER=$(clang --version | grep -oP '(?<=version )\d+' | head -1)
          [ -e /usr/bin/clang-cl ]  || sudo ln -s /usr/bin/clang-cl-$CLANG_VER  /usr/bin/clang-cl
          [ -e /usr/bin/lld-link ]  || sudo ln -s /usr/bin/lld-link-$CLANG_VER  /usr/bin/lld-link

      - name: Setup Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y --no-install-recommends wine64 wine32
      
      - name: Setup MSVC
        run: |
          git clone https://github.com/mstorsjo/msvc-wine
          cd msvc-wine
          python vsdownload.py --accept-license --dest $(pwd)/my_msvc
          ./install.sh $(pwd)/my_msvc
          export PATH=$(pwd)/my_msvc/bin/x64:$PATH
          export WINDOWS_SDK_PATH=$(pwd)/my_msvc
          echo "WINDOWS_SDK_PATH=$WINDOWS_SDK_PATH" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV >> $GITHUB_PATH

      # rm: via act theres an error where CMake was unable to find a build program corresponding to "Ninja"
      - name: Setup Build Directory
        run: |
          mkdir build
          cd build
          cmake .. -B . -GNinja \
            -DCMAKE_MAKE_PROGRAM=$(which ninja) \
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} \
            -DWINDOWS_SDK_PATH=$WINDOWS_SDK_PATH \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/LinuxCrosscompile.cmake

      - name: Build Minecraft Legacy Console Edition
        run: |
          cd build
          ninja

      - name: Upload Release + Debug Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftClient-${{ matrix.configuration }}
          path: build

